name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: egras
          POSTGRES_PASSWORD: egras
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U egras"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all-features
        env:
          RUST_LOG: info
          TEST_DATABASE_URL: postgres://egras:egras@127.0.0.1:15432/postgres

      - name: build release
        run: cargo build --release

      - name: openapi drift check
        run: |
          EGRAS_DATABASE_URL=postgres://egras:egras@127.0.0.1:15432/postgres \
          EGRAS_JWT_SECRET=ci-only-32-bytes-placeholder-xxxxx \
          EGRAS_CORS_ALLOWED_ORIGINS=http://localhost:3000 \
            ./target/release/egras dump-openapi > target/openapi-ci.json
          diff docs/openapi.json target/openapi-ci.json
